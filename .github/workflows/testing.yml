name: Continuous Integration (Tests)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test_api:
    runs-on: ubuntu-latest

    steps:
    - name: Récupération du code
      uses: actions/checkout@v4

    - name: Installation de Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Installation des librairies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lancement des Tests Unitaires
      run: |
        pytest tests/

  # Déploiement automatique sur Render après succès des tests
  deploy:
    needs: test_api
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Déploiement sur Render
      run: |
        # On envoie un POST au webhook Render pour déclencher le redéploiement
        curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"